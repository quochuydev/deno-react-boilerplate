name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Build renderer
        run: deno task build:renderer

      - name: Test
        run: deno test -A
