name: Release

# Push a version tag (e.g. `git tag v0.1.1 && git push origin v0.1.1`) to build
# the desktop app and publish it as a GitHub Release with the artifact attached.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install

      - name: Build macOS .dmg
        run: deno task build:mac

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          append_body: true
          body: |
            **Download:** `EvaKiosk.dmg` (macOS, Apple Silicon) below.

            ### Install

            1. Open `EvaKiosk.dmg` and drag **EvaKiosk** to **Applications**.
            2. On first launch macOS will say **"EvaKiosk" Not Opened** — this build is **ad-hoc signed** (no Apple Developer ID yet), so Gatekeeper can't verify it. To open it anyway, pick one:
               - **Finder:** right-click the app → **Open** → **Open**, or
               - **System Settings → Privacy & Security →** click **Open Anyway**, or
               - **Terminal:** `xattr -dr com.apple.quarantine "/Applications/EvaKiosk.app"`

            After that it opens normally.

            ---
          files: release/EvaKiosk.dmg
